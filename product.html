<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Detail – ShoeHub</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
  <nav class="nav">
    <div class="nav-logo"><a href="index.html">SHOE<span class="accent">HUB</span></a></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <button id="cart-btn"><i data-feather="shopping-cart"></i><span id="cart-count">0</span></button>
    </div>
  </nav>

  <main class="product-detail">
    <div class="product-gallery">
      <img id="main-image" src="" alt="Product Image" style="width:100%; border-radius:12px;">
      <div class="thumbnail-row" id="thumbnails" style="display:flex; gap:8px; margin-top:8px; overflow-x:auto;"></div>
    </div>
    
    <div class="product-details">
      <h1 id="product-name"></h1>
      <div class="product-rating">★★★★★ <span>(48 reviews)</span></div>
      <div class="product-price">
        <span class="current-price">৳<span id="price"></span></span>
        <span class="original-price" id="original-price"></span>
        <span class="discount-badge" id="discount-badge"></span>
      </div>
      
      <div class="size-selector">
        <label><strong>Select Size:</strong></label>
        <div id="size-options" class="size-options" style="display:flex; gap:8px; margin:12px 0; flex-wrap:wrap;"></div>
      </div>
      
      <div class="product-features" id="features"></div>
      
      <div class="trust-strip" style="display:flex; gap:20px; margin:16px 0; color:#2e7d32; font-weight:500;">
        <span>✔ 7-day exchange</span>
        <span>✔ 100% original</span>
      </div>
      
      <div class="cta-buttons" style="display:flex; gap:12px; margin-top:20px;">
        <button id="add-to-cart" class="btn btn-primary" style="flex:1;">Add to Cart</button>
        <button id="buy-now" class="btn btn-outline" style="flex:1;">Buy Now</button>
      </div>
    </div>
  </main>

  <!-- Cart Panel -->
  <div id="cart-overlay" class="cart-overlay"></div>
  <div id="cart-panel" class="cart-panel">
    <div class="cart-header">
      <h3>Your Cart</h3>
      <button id="close-cart"><i data-feather="x"></i></button>
    </div>
    <div id="cart-items" class="cart-items"></div>
    <div class="cart-footer">
      <div class="cart-total">Total: ৳<span id="cart-total">0</span></div>
      <a href="checkout.html" class="btn btn-primary btn-block">Proceed to Checkout</a>
    </div>
  </div>

  <script src="products.js"></script>
  <script src="cart.js"></script>
  <script>
    // Get product ID from URL
    const params = new URLSearchParams(window.location.search);
    const productId = parseInt(params.get('id'));
    const product = products.find(function(p) { return p.id === productId; });
    
    let selectedSize = null;

    if (!product) {
      document.body.innerHTML = '<div style="text-align:center; padding:100px;"><h2>Product not found</h2><a href="index.html">Go back to shop</a></div>';
    } else {
      // Set product details
      document.getElementById('product-name').textContent = product.name;
      document.getElementById('price').textContent = product.price;
      
      if (product.originalPrice) {
        document.getElementById('original-price').textContent = '৳' + product.originalPrice;
        const discount = Math.round(((product.originalPrice - product.price) / product.originalPrice) * 100);
        document.getElementById('discount-badge').textContent = discount + '% OFF';
      }
      
      // Features
      const featuresList = document.getElementById('features');
      product.features.forEach(function(f) {
        featuresList.innerHTML += '<p>✔ ' + f + '</p>';
      });
      
      // Main image
      document.getElementById('main-image').src = product.images[0];
      
      // Thumbnails
      const thumbRow = document.getElementById('thumbnails');
      product.images.forEach(function(img) {
        const thumb = document.createElement('img');
        thumb.src = img;
        thumb.style = 'width:60px; height:60px; border-radius:8px; object-fit:cover; cursor:pointer; border:2px solid transparent;';
        thumb.onclick = function() {
          document.getElementById('main-image').src = img;
        };
        thumbRow.appendChild(thumb);
      });
      
      // Size options
      const sizeContainer = document.getElementById('size-options');
      product.sizes.forEach(function(size) {
        const btn = document.createElement('button');
        btn.textContent = 'UK ' + size;
        btn.style = 'padding:8px 16px; border:1px solid #ccc; border-radius:8px; background:white; cursor:pointer;';
        btn.onclick = function() {
          // Remove selected from all
          document.querySelectorAll('.size-btn').forEach(function(b) {
            b.style.background = 'white';
            b.style.color = 'black';
            b.style.borderColor = '#ccc';
          });
          // Select this one
          this.style.background = '#FF6B00';
          this.style.color = 'white';
          this.style.borderColor = '#FF6B00';
          selectedSize = size;
        };
        btn.className = 'size-btn';
        sizeContainer.appendChild(btn);
      });
    }

    // Add to Cart button
    document.getElementById('add-to-cart').onclick = function() {
      if (!selectedSize) {
        alert('Please select a size first!');
        return;
      }
      addToCart(product.id, selectedSize, 1);
      alert('Added to cart!');
      // Update cart display
      if (typeof updateCartUI === 'function') {
        updateCartUI();
      }
    };

    // Buy Now button
    document.getElementById('buy-now').onclick = function() {
      if (!selectedSize) {
        alert('Please select a size first!');
        return;
      }
      addToCart(product.id, selectedSize, 1);
      window.location.href = 'checkout.html';
    };

    feather.replace();
  </script>
</body>
</html>
